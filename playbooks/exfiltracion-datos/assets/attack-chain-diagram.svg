<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300">
  <defs>
    <style>
      .attack-box { fill: #fff3cd; stroke: #ff6b6b; stroke-width: 2; }
      .attack-title { font-family: Arial, sans-serif; font-weight: bold; font-size: 14px; fill: #333; }
      .attack-subtitle { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
      .technique-id { font-family: monospace; font-size: 11px; fill: #d32f2f; font-weight: bold; }
      .arrow { fill: none; stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .phase { font-family: Arial, sans-serif; font-weight: bold; font-size: 13px; fill: #fff; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="25" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">
    Cadena de Ataque: Exfiltración de Datos
  </text>

  <!-- Phase 1: Explotación -->
  <rect x="30" y="60" width="140" height="100" class="attack-box" rx="5"/>
  <text x="100" y="85" class="attack-title" text-anchor="middle">Explotación</text>
  <text x="100" y="105" class="technique-id" text-anchor="middle">T1190</text>
  <text x="100" y="125" class="attack-subtitle" text-anchor="middle" font-size="10">Vulnerable app</text>
  <text x="100" y="140" class="attack-subtitle" text-anchor="middle" font-size="10">or plugin</text>

  <!-- Arrow 1 -->
  <path d="M 170 110 L 220 110" class="arrow"/>

  <!-- Phase 2: Acceso a Credenciales -->
  <rect x="220" y="60" width="140" height="100" class="attack-box" rx="5"/>
  <text x="290" y="85" class="attack-title" text-anchor="middle">Credenciales</text>
  <text x="290" y="105" class="technique-id" text-anchor="middle">T1552.001</text>
  <text x="290" y="125" class="attack-subtitle" text-anchor="middle" font-size="10">Lee .env,</text>
  <text x="290" y="140" class="attack-subtitle" text-anchor="middle" font-size="10">config files</text>

  <!-- Arrow 2 -->
  <path d="M 360 110 L 410 110" class="arrow"/>

  <!-- Phase 3: Persistencia -->
  <rect x="410" y="60" width="140" height="100" class="attack-box" rx="5"/>
  <text x="480" y="85" class="attack-title" text-anchor="middle">Persistencia</text>
  <text x="480" y="105" class="technique-id" text-anchor="middle">T1505.003</text>
  <text x="480" y="125" class="attack-subtitle" text-anchor="middle" font-size="10">Web shell</text>
  <text x="480" y="140" class="attack-subtitle" text-anchor="middle" font-size="10">backdoor</text>

  <!-- Arrow 3 -->
  <path d="M 550 110 L 600 110" class="arrow"/>

  <!-- Phase 4: Recolección -->
  <rect x="600" y="60" width="140" height="100" class="attack-box" rx="5"/>
  <text x="670" y="85" class="attack-title" text-anchor="middle">Recolección</text>
  <text x="670" y="105" class="technique-id" text-anchor="middle">T1560</text>
  <text x="670" y="125" class="attack-subtitle" text-anchor="middle" font-size="10">Comprime</text>
  <text x="670" y="140" class="attack-subtitle" text-anchor="middle" font-size="10">base de datos</text>

  <!-- Arrow 4 -->
  <path d="M 740 110 L 790 110" class="arrow"/>

  <!-- Phase 5: Exfiltración -->
  <rect x="790" y="60" width="140" height="100" class="attack-box" rx="5"/>
  <rect x="795" y="65" width="130" height="90" fill="#d32f2f" rx="3" opacity="0.9"/>
  <text x="860" y="93" class="phase" text-anchor="middle">Exfiltración</text>
  <text x="860" y="113" class="technique-id" text-anchor="middle" fill="#fff">T1048</text>
  <text x="860" y="133" class="attack-subtitle" text-anchor="middle" fill="#fff">Sale por FTP/</text>
  <text x="860" y="148" class="attack-subtitle" text-anchor="middle" fill="#fff">HTTP/DNS</text>

  <!-- Bottom timeline -->
  <line x1="30" y1="200" x2="930" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Detection points -->
  <circle cx="100" cy="200" r="5" fill="#4caf50"/>
  <text x="100" y="225" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">HTTP logs</text>

  <circle cx="290" cy="200" r="5" fill="#4caf50"/>
  <text x="290" y="225" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">File access</text>

  <circle cx="480" cy="200" r="5" fill="#4caf50"/>
  <text x="480" y="225" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">File creation</text>

  <circle cx="670" cy="200" r="5" fill="#4caf50"/>
  <text x="670" y="225" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">Disk usage</text>

  <circle cx="860" cy="200" r="5" fill="#d32f2f"/>
  <text x="860" y="225" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">Network anomaly</text>

  <!-- Legend -->
  <text x="30" y="280" font-family="Arial" font-size="11" fill="#999">🟢 Detection opportunities | 🔴 Critical phase</text>
</svg>