  <text x="400" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Gestión de Accesos y MFA</text>
  <text x="655" y="250" text-anchor="start" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Protección de</text>
  <text x="655" y="266" text-anchor="start" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Infraestructura y Red</text>
  <text x="655" y="478" text-anchor="start" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Seguridad Web y</text>
  <text x="655" y="494" text-anchor="start" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Servicios Externalizados</text>
  <text x="400" y="650" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Continuidad de Negocio y Backups</text>
  <text x="145" y="478" text-anchor="end" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Concienciación y</text>
  <text x="145" y="494" text-anchor="end" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Políticas de Seguridad</text>
  <text x="145" y="250" text-anchor="end" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">Protección Endpoint</text>
  <text x="145" y="266" text-anchor="end" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">y Antimalware</text>
  <rect x="530" y="32" width="240" height="70" rx="8" fill="white" fill-opacity="0.95" stroke="#D3D1C7" stroke-width="0.8"/>
  <line x1="550" y1="57" x2="590" y2="57" stroke="#3266ad" stroke-width="2.5"/>
  <circle cx="570" cy="57" r="4" fill="#3266ad"/>
  <text x="600" y="61" font-family="system-ui,sans-serif" font-size="13" fill="#2C2C2A">Madurez actual</text>
  <line x1="550" y1="82" x2="590" y2="82" stroke="#E24B4A" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="600" y="86" font-family="system-ui,sans-serif" font-size="13" fill="#2C2C2A">Madurez objetivo</text>
